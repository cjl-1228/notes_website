<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频下拉列表选择（无缝衔接）</title>
    <style>
        #select {
            width: 200px;
            height: 250px;
        }
    </style>
</head>

<body>
    <p>正在播放 <span id="text">周杰伦 - 青花瓷</span>歌曲</p>
    <audio src="./MP3/周杰伦 - 青花瓷.mp3" controls id="audio" autoplay data-num="0"></audio>
    <br>
    <input type="button" value="上一首" id="topSings">
    <input type="button" value="下一首" id="downSings">
    <br>
    <select name="" id="select" multiple>
        <option value="0" selected>周杰伦 - 青花瓷</option>
        <option value="1">周杰伦 - 半岛铁盒</option>
        <option value="2">周杰伦 - 简单爱</option>
        <option value="3">周杰伦 - 东风破</option>
        <option value="4">周杰伦 - 红尘客栈</option>
        <option value="5">周杰伦 - 菊花台</option>
        <option value="6">周杰伦 - 夜的第七章</option>
        <option value="7">周杰伦 - 给我一首歌的时间</option>
        <option value="8">周杰伦 - 晴天的铃声</option>
    </select>


    <script>
        let text = document.getElementById("text");
        let audio = document.getElementById("audio");
        let select = document.getElementById("select");
        let topSings = document.getElementById("topSings");
        let downSings = document.getElementById("downSings");
        let options = document.querySelectorAll("#select option");
    
        console.log(options);
    
        let sings = [
            { src: "web/English/audio/file/A1/12 曲目 12.mp3" },
            { src: "./MP3/周杰伦 - 半岛铁盒.mp3" },
            { src: "./MP3/周杰伦 - 简单爱.mp3" },
            { src: "./MP3/周杰伦 - 东风破.mp3" },
            { src: "./MP3/周杰伦 - 红尘客栈.mp3" },
            { src: "./MP3/周杰伦 - 菊花台.mp3" },
            { src: "./MP3/周杰伦 - 夜的第七章.mp3" },
            { src: "./MP3/周杰伦 - 给我一首歌的时间.mp3" },
            { src: "./MP3/周杰伦 - 晴天的铃声.mp3" }
        ];
    
        //选择options后自动selected反馈选择
        function selected() {
            for (let j = 0; j < options.length; j++) {
                if (audio.dataset.num == options[j].value) {
                    options[j].selected = true;
                    text.innerHTML = options[j].innerText;
                } else {
                    options[j].selected = false;
                }
            }
        }

                //播放完成后自动播放下一首歌曲
        audio.onended = function () {
            for (let i = 0; i < sings.length; i++) {
                if (audio.dataset.num == i && i != sings.length - 1) {
                    audio.src = sings[i + 1].src;
                    audio.dataset.num = i + 1;
                    selected();
                    break;
                } else if (audio.dataset.num == sings.length - 1) {
                    audio.src = sings[i].src;
                    audio.dataset.num = i;
                    selected();
                    break;
                }
            }
        }

        //点击上一首
        topSings.onclick = function () {
            for (let i = 0; i < sings.length; i++) {
                if (audio.dataset.num == 0) {
                    audio.src = sings[sings.length - 1].src;
                    audio.dataset.num = sings.length - 1;
                    selected();
                    break;
                } else if (parseInt(audio.dataset.num) == i && i != 0) {
                    audio.src = sings[i - 1].src;
                    audio.dataset.num = i - 1;
                    selected();
                    break;
                }
            }
        }
        //点击下一首
        downSings.onclick = function () {
            // console.log(audio.dataset.num);
            for (let i = 0; i < sings.length; i++) {
                if (parseInt(audio.dataset.num) == i) {
                    audio.src = sings[i + 1].src;
                    audio.dataset.num = i + 1;
                    selected();
                    break;
                } else if (audio.dataset.num == sings.length - 1) {
                    audio.src = sings[i].src;
                    audio.dataset.num = i;
                    selected();
                    break;
                }
            }
        }

        //点击下拉列表里面的歌曲
        select.onchange = function () {
            for (let i = 0; i < sings.length; i++) {
                if (this.value == i) {
                    audio.src = sings[i].src;
                    audio.dataset.num = this.value;
                }
            }
        }

    </script>
