                   <h2>2.1環境分析的架構</h2>
                   <ul>
                    <li>環境是指組織外部的環境</li>
                    <li><span>行銷環境</span>可以分成以下三種：
                         <ul>
                            <li>個體環境(直接環境)
                                <ul>
                                    <li>對組織的經營有直接與立即影響的環境因素。</li>
                                </ul>
                            </li>
                            <li>總體環境(間接環境)
                                <ul>
                                    <li>對組織的經營有間接影響的環境因素。</li>
                                </ul>
                            </li>
                            <li>超環境(鬼神環境)
                                <ul>
                                    <li>指外界一些冥冥不可知的力量。</li>
                                </ul>
                            </li><br>
                            <img src="data/1.png" width="600px">
                         </ul>
                    </li>
                   </ul>
