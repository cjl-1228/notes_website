<html>
  <head>
    <style>
      canvas {
        border: 1px solid black;
        
      }
    </style>
  </head>
  <body>

    <canvas id="myCanvas" width="500" height="500"></canvas>
    <button id="clearBtn">Clear</button><br>
    <input type="text" id="word">
    <button type="submit" id="ok">OK</button>
    
    <script src="https://stroke-order.learningweb.moe.edu.tw/js/playerShare.js"></script>

    <div id="stroke_player" style="width:348px; height:470px;"></div>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        let painting = false;
  
        function startPainting(e) {
          painting = true;
          draw(e);
        }
  
        function stopPainting() {
          painting = false;
          ctx.beginPath();
        }
  
        function draw(e) {
          if (!painting) return;
          ctx.lineWidth = 5;
          ctx.lineCap = "round";
          ctx.lineTo(e.clientX, e.clientY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(e.clientX, e.clientY);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }


        function loadword() {
            let word = document.getElementById("word").value;
            const w = toUnicode(word).substring(2);
            var playerShare = new PlayerShare('https://stroke-order.learningweb.moe.edu.tw/',w,'0','zh_TW');
            playerShare.load(); 
        }

        function toUnicode(str) {
            return str.split('').map(function (value, index, array) {
                return '\\u' + value.charCodeAt(0).toString(16);
            }).join('');
        }
        5
        canvas.addEventListener("mousedown", startPainting);
        canvas.addEventListener("mouseup", stopPainting);
        canvas.addEventListener("mouseleave", stopPainting);
        canvas.addEventListener("mousemove", draw);
        clearBtn.addEventListener("click", clearCanvas);
        ok.addEventListener("click", loadword);
      </script>
  </body>
</html>
