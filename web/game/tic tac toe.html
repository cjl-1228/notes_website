<!DOCTYPE html>
<html>

<head>
  <style>
    .tic-tac-toe {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      grid-gap: 10px;
      width: 300px;
      height: 300px;
      margin: auto;
    }

    .tic-tac-toe button {
      width: 100%;
      height: 100%;
      font-size: 3em;
    }
  </style>
</head>

<body>
  <div class="tic-tac-toe">
    <button id="0"></button>
    <button id="1"></button>
    <button id="2"></button>
    <button id="3"></button>
    <button id="4"></button>
    <button id="5"></button>
    <button id="6"></button>
    <button id="7"></button>
    <button id="8"></button>
  </div>

  <script>
    const buttons = document.querySelectorAll(".tic-tac-toe button");
    let player = "X";

    buttons.forEach((button) => {
      button.addEventListener("click", (event) => {
        if (event.target.innerText) {
          return;
        }
        event.target.innerText = player;
        player = player === "X" ? "O" : "X";
        checkVictory();
      });
    });

    const checkVictory = () => {
      const winningCombinations = [[0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6],
      ];

      for (let i = 0; i < winningCombinations.length; i++) {
        const [a, b, c] = winningCombinations[i];
        if (
          buttons[a].innerText &&
          buttons[a].innerText === buttons[b].innerText &&
          buttons[a].innerText === buttons[c].innerText
        ) {
          alert(`Player ${buttons[a].innerText} wins!`);
          location.reload();
          return;
        }
      }

      if (buttons.every((button) => button.innerText)) {
        alert("It's a draw!");
        location.reload();
      }
    };
  </script>
</body>

</html>
