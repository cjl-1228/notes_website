<!DOCTYPE html>
<html>
<head>
  <style>
    /* CSS goes here */
    h1 {
      font-size: 24px;
      color: blue;
    }
    button {
      font-size: 18px;
      font-weight: bold;
      color: white;
      background-color: green;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>剪刀石頭布小遊戲</h1>

  <div id="result">
    <p>選擇出拳:</p>
    <button onclick="play('石頭')">石頭</button>
    <button onclick="play('布')">布</button>
    <button onclick="play('剪刀')">剪刀</button>
  </div>

  <script>
    // Javascript goes here
    function play(playerMove) {
      // Generate a random move for the computer

      const randomNumber = Math.random();
      if (randomNumber < 0.33) {
        computerMove = '石頭';
      } else if (randomNumber < 0.66) {
        computerMove = '布';
      } else {
        computerMove = '剪刀';
      }
      

      // Determine the winner
      let result;
      if (playerMove === computerMove) {
        result = '平手';
      } else if (playerMove === '石頭' && computerMove === '布') {
        result = '電腦獲勝';
      } else if (playerMove === '布' && computerMove === '剪刀') {
        result = '電腦獲勝';
      } else if (playerMove === '剪刀' && computerMove === '石頭') {
        result = '電腦獲勝';
      } else {
        result = '玩家獲勝';
      }

      // Display the result
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `<p>你選擇 <strong>${playerMove}</strong>, 電腦選擇 <strong>${computerMove}</strong>.</p>
                            <p>結果:<strong>${result}</strong></p>`;
      const restartButton = document.createElement("button");
      restartButton.innerText = "重新開始";
      restartButton.style.position = "absolute";
      restartButton.style.textAlign = "center";
      restartButton.style.margin = "auto";
      restartButton.style.fontSize = "15px";
      restartButton.style.fontWeight = "bold";
      restartButton.style.color = "black";
      restartButton.style.border = "2px solid black";
      restartButton.style.borderRadius = "10px";
      restartButton.style.backgroundColor = "yellow";
      restartButton.addEventListener("click", () => {
        location.reload();
      });
      document.body.appendChild(restartButton);
    }
  </script>
</body>
</html>
