            <br>
            <div style="width: 70%; text-align: left; margin-left: 15%;  padding-left: 10px;border-width:2px;  " >
                <h1>My Trip Planner</h1>
                <form id="trip-form">
                  <div>
                    <label for="destination">Destination:</label>
                    <input type="text" id="destination" name="destination">
                  </div>
                  <div>
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date">
                  </div>
                  <button type="submit">Add Trip</button>
                </form>
                <h2>My Trips</h2>
                <ul id="trip-list"></ul>
                <script>
                    const form = document.querySelector('#trip-form');
                    const tripList = document.querySelector('#trip-list');
            
                    form.addEventListener('submit', event => {
                    event.preventDefault();
            
                    const destination = form.destination.value;
                    const date = form.date.value;
            
                    const trip = document.createElement('li');
                    trip.textContent = `Trip to ${destination} on ${date}`;
            
                    tripList.appendChild(trip);
            
                    form.reset();
                    });
                </script>
            </div>           
                
        </div>
