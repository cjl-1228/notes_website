<!-- 實作偵測捲軸捲到底 -->
<html>
  <head>
    <script type="text/javascript">
      var box, scrollId, boxHeight;
      window.onload = function () {
        box = document.getElementById("box");

        //捲到底: box.scrollTop + boxHeight = box.scrollHeight
        boxHeight = window.getComputedStyle(box).getPropertyValue("height"); //取得div的高度
        boxHeight = parseInt(boxHeight);

        //自動捲動
        scrollId = window.setInterval(scroll, 50);
      };
      function scroll() {
        if (box.scrollTop + boxHeight < box.scrollHeight) {
          box.scrollTop++;
        } else {
          window.clearInterval(scrollId);
          alert("捲到底囉");
        }
      }
    </script>
    <style type="text/css">
      .box {
        width: 200px;
        height: 100px;
        overflow: hidden;
        border: 1px solid #000000;
      }
    </style>
  </head>
  <body>
    <div id="box" class="box">
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
      <div>content</div>
    </div>
  </body>
</html>
