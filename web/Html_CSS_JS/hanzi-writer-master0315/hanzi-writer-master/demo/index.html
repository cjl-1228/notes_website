<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="UTF-8">
		<title>Hanzi Writer index</title>
		<!-- <link href='http://fonts.googleapis.com/css?family=Raleway' rel='stylesheet' type='text/css'> -->
		<link rel="stylesheet" href="styles.css" />
		<script src="https://cdn.polyfill.io/v2/polyfill.min.js"></script>
		<script type="application/javascript" src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

	</head>
	<body>
    <label>
      Character
      <input type="text" class="js-char char-input" size="1" maxlength="2"  id="input-char"/>
  </label>
  <button type="submit" class="reload-submit-char btn btn-success" id="ok" >Update</button>
  <button  class="test btn btn-success" id="o" >測試</button>
    <div id="character-target-1"></div>
    <div id="character-target-2"></div>
    <button id="animate-button">Start</button>

    <script>
      var el2 = document.querySelector(".test");
      el2.onclick = function(){
        var test_character = document.getElementById("input-char").value;
        var str="";
        str = test_character;
        console.log(str);
        var character0 = str[0];
        var character1 = str[1];
        console.log(character0);
        console.log(character1);
        //目前需要判斷輸入多個漢字 要怎麼處理
        var char1 = HanziWriter.create('character-target-1', character0, {
              width: 100,
              height: 100,
              padding: 5,
              showCharacter: false
            });
        var char2 = HanziWriter.create('character-target-2', character1, {
                width: 100,
                height: 100,
                padding: 5,
                showCharacter: false
              });
          function chainAnimations() {
          var delayBetweenAnimations = 1000; // milliseconds
          char1.hideCharacter();
          char2.hideCharacter();

          char1.animateCharacter({
            onComplete: function() {
              setTimeout(function() {
                char2.animateCharacter();
              }, delayBetweenAnimations);
            }
          });
        }

      document.getElementById('animate-button').addEventListener('click', chainAnimations);
      }
    
      
    </script>
        

		<!-- <script src="https://cdn.polyfill.io/v2/polyfill.min.js"></script> -->
		<script type="application/javascript" src="../dist/hanzi-writer.js"></script>
		<script type="application/javascript" src="index.js"></script>

	</body>
</html>
