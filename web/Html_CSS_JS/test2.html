<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" id="w" autofocus>
    <button id="ok" autofocus>OK</button><br><br>

    <select name="voice" id="voices">
        <option value="">Select A Voice</option>
    </select><br><br>

    <label for="rate">Rate:</label>
    <input name="rate" type="range" min="0" max="3" value="1" step="0.1">

    <label for="pitch">Pitch:</label>

    <input name="pitch" type="range" min="0" max="2" step="0.1"><br><br>
    <textarea id="txtara" name="text"></textarea><br>
    <button id="speak">Speak</button>
    <button id="stop">Stop!</button>


    <script>

        const msg = new SpeechSynthesisUtterance(); //come from WEB Speech API
        let voices = [];
        const voicesDropdown = document.querySelector('[name="voice"]');
        const options = document.querySelectorAll('[type="range"], [name="text"]');
        const speakButton = document.querySelector('#speak');
        const stopButton = document.querySelector('#stop');

        msg.text = document.querySelector('[name="text"]').value;

        function populateVoices() {
            voices = this.getVoices();
            console.log(voices);
            voicesDropdown.innerHTML = voices
                .map(voice => `<option value="${voice.name}">${voice.name} (${voice.lang})</option>`)
                .join('');
        }

        function setVoice() {
            console.log('changing voice');
            msg.voice = voices.find(voice => voice.name === this.value);
            toggle();
        }

        function toggle(startOver = true) {
            speechSynthesis.cancel(); // stop speaking
            if (startOver) {
                speechSynthesis.speak(msg); // restart speaking
            }
        }

        function setOption() {
            console.log(this.name, this.value);
            msg[this.name] = this.value;
            toggle();
        }

        speechSynthesis.addEventListener('voiceschanged', populateVoices);
        voicesDropdown.addEventListener('change', setVoice);

        options.forEach(option => option.addEventListener('change', setOption))
        speakButton.addEventListener('click', toggle);
        stopButton.addEventListener('click', () => toggle(false));



        function getData() {

            var a = document.getElementById("w").value
            var xhr = new XMLHttpRequest();
            let s = "https://www.moedict.tw/raw/" + a

            xhr.open("GET", s, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    var w_data = [data["title"], data["radical"], data["stroke_count"], data["heteronyms"][0]["bopomofo"]];
                    var s = w_data[0] + ", " + w_data[1] + "部, " + "共" + w_data[2] + "畫, " + w_data[3]

                    document.getElementById('txtara').innerHTML = s;

                }
            };
            xhr.send();
        }

        ok.addEventListener("click", getData);

    </script>
</body>

</html>
