    <script>
        function showClock(){
            var today = Date();
            var month = today.toString().slice(4, 7);
            var day = today.toString().slice(8, 10);
            var year = today.toString().slice(10, 15);
            var hour = today.toString().slice(15, 18);
            var week = today.toString().slice(0, 3);
            var time = today.toString().slice(18, 24);

            if (week == "Tue"){
                week = "星期二";
            }
            else if(week == "Wed"){
                week = "星期三";
            }
            else if(week == "Thu"){
                week = "星期四";
            }
            else if(week == "Fri"){
                week = "星期五";
            }
            else if(week == "Sat"){
                week = "星期六";
            }
            else if(week == "Sun"){
                week = "星期日";
            }
            else if(week == "Mon"){
                week = "星期一";
            }

            if (month == "Oct"){
                month = "10"
            }
            else if(month == "Nov"){
                month = "11";
            }
            else if(month == "Dec"){
                month = "12";
            }
            else if(month == "Jan"){
                month = "1";
            }
            else if(month == "Feb"){
                month = "2";
            }
            else if(month == "Mar"){
                month = "3";
            }
            else if(month == "Apr"){
                month = "4";
            }
            else if(month == "May"){
                month = "5";
            }
            else if(month == "Jun"){
                month = "6";
            }
            else if(month == "Jul"){
                month = "7";
            }
            else if(month == "Aug"){
                month = "8";
            }
            else if(month == "Sep"){
                month = "9";
            }
            
            var qq = "上午";

            if (hour>12){
                hour -=12;
                qq = "下午";
            }
            document.myForm.myField.value = "現在時間："+week+" "+year+"/"+month+"/"+day+" "+qq+hour+time;
            
            setTimeout("showClock()",1000);
        }
    </script>
